[tool.ruff]
target-version = "py313"
line-length = 88

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
]
ignore = [
    "E501",  # line too long — handled by formatter where possible; docstrings/comments exempt
]

[tool.ruff.format]
# black-compatible defaults (double quotes, trailing commas, etc.)
quote-style = "double"
indent-style = "space"

[tool.pyright]
pythonVersion = "3.13"
include = ["src", "tests"]
typeCheckingMode = "basic"
