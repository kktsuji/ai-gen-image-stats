# ------------------------------------------------------------------------------
# DATA PREPARATION CONFIGURATION
# ------------------------------------------------------------------------------
experiment: data_preparation # Name of the experiment to run

# Class directories to scan for images
# Each class must specify a path (directory containing images) and a label (integer).
# Labels must be unique and form a contiguous range starting from 0.
classes:
  normal:
    path: "data/0.Normal" # Path to the directory containing normal class images
    label: 0
  abnormal:
    path: "data/1.Abnormal" # Path to the directory containing abnormal class images
    label: 1

# Split configuration
# train_ratio, val_ratio and test_ratio must all be specified and sum to 1.0.
# Set test_ratio to 0.0 for a train/val-only split.
split:
  seed: 42 # Random seed for reproducible train/val/test splitting
  train_ratio: 0.7 # Fraction of data to use for training
  val_ratio: 0.15 # Fraction of data to use for validation (model selection)
  test_ratio: 0.15 # Fraction of data to hold out for unbiased test evaluation
  save_dir: "outputs/splits" # Directory where the split file will be saved
  split_file: "train_val_test_split.json" # Filename for the JSON file storing the splits
  force: false # If true, overwrite existing split file even if it already exists
