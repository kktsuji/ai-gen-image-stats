name: Copilot Coding Agent

# Triggers when @copilotask is mentioned in issues or PR comments.
# Using @copilotask (instead of @copilot) avoids conflicts with GitHub's
# native @copilot mention handling and prevents accidental triggering.
# Assigns the issue/PR to the Copilot coding agent via the GitHub REST API,
# which starts a Copilot session on that item.
#
# Note: GitHub Copilot coding agent must be enabled for your repository
# (requires GitHub Copilot Business or Enterprise plan).
# See: https://docs.github.com/en/copilot/using-github-copilot/coding-agent

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  copilot:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@copilotask')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@copilotask')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@copilotask')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@copilotask') || contains(github.event.issue.title, '@copilotask')))
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Assign to Copilot coding agent
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber =
              context.payload.issue?.number ??
              context.payload.pull_request?.number;

            if (!issueNumber) {
              core.warning('Could not determine issue/PR number from event payload.');
              return;
            }

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              assignees: ['copilot'],
            });
